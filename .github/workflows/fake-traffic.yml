name: NeonBanyan Traffic Generator

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  generate-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Generate API Traffic
        run: |
          BASE_URL="https://demo-live-api-harsha-test.unkey.app"

          ENDPOINTS=(
            "/"
            "/health"
            "/customers"
            "/customers/1"
            "/customers/999"
            "/workspaces"
            "/apis"
            "/deployments"
            "/agents"
            "/events"
            "/subscriptions"
            "/billing"
            "/slow-api"
            "/random-error"
          )

          for i in {1..50}
          do
            RANDOM_ENDPOINT=${ENDPOINTS[$RANDOM % ${#ENDPOINTS[@]}]}

            curl -s \
              -o /dev/null \
              -w "%{http_code}\n" \
              "$BASE_URL$RANDOM_ENDPOINT"

            sleep 2
          done
