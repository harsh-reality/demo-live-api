name: Demo Live API Traffic

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  hit-api:
    runs-on: ubuntu-latest

    steps:
      - name: Send fake traffic
        run: |
          API_URL="https://demo-live-api-harsha-test.unkey.app"

          for i in {1..20}
          do
            ENDPOINTS=("/" "/health" "/customers" "/customers/1" "/customers/999" "/orders" "/random-error")
            RANDOM_ENDPOINT=${ENDPOINTS[$RANDOM % ${#ENDPOINTS[@]}]}

            echo "Calling $API_URL$RANDOM_ENDPOINT"
            curl -s -o /dev/null -w "%{http_code}\n" "$API_URL$RANDOM_ENDPOINT"

            sleep 2
          done
